<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DCS Safety Dashboard - Decompression Sickness Risk Models for Research. Publication-quality visualizations with ECharts." />
    <meta name="keywords" content="DCS, decompression sickness, risk model, altitude, NASA, 3RUT, safety, research" />
    <meta name="author" content="DCS Research Team" />
    <title>DCS Safety Dashboard | Decompression Sickness Risk Explorer</title>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DCS Safety Dashboard" />
    <meta property="og:description" content="Research UI for exploring DCS risk models with publication-quality visualizations." />
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Apply the theme class before first paint to avoid a light->dark
         flash on dark-first load. Mirrors the App.tsx default: dark unless
         the OS explicitly prefers light. -->
    <script>
      (function () {
        try {
          var prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
          document.documentElement.classList.toggle("dark", !prefersLight);
          // Paint the base background immediately so the stratosphere bg
          // shows before the CSS bundle finishes loading.
          document.documentElement.style.backgroundColor = prefersLight
            ? "#f6f8fc"
            : "#0a0f1a";
        } catch (_e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
